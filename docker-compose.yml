services:
  redis:
    image: redis:7-alpine
    container_name: learning-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: redis-with-mongo
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=mongo_redis
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
  
volumes:
  redis-data:
  mongo-data:
    